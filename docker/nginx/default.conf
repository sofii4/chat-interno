# ============================================
# Nginx + PHP-FPM para Slim Framework
# ============================================

upstream php-fpm {
    server php:9000;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Limites de upload (sincronizar com PHP)
    client_max_body_size 12M;
    client_body_buffer_size 128k;

    # Timeouts para requisições longas
    fastcgi_read_timeout 300s;
    proxy_read_timeout 300s;

    # Health check endpoint (criar em routes se necessário)
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Servir arquivos estáticos diretamente
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(vendor|config|bin) {
        deny all;
        return 404;
    }

    # Regra principal: Slim Framework routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Processar PHP via PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Configurações de buffer
        fastcgi_buffering on;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
    }
}