[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:ratchet]
command=php /var/www/html/bin/chat-server.php
autostart=true
autorestart=true
startretries=10
stderr_logfile=/var/log/supervisor/ratchet.err.log
stdout_logfile=/var/log/supervisor/ratchet.out.log
user=www-data
stopwaitsecs=10
stopsignal=TERM

; Política de restart agressiva para alta disponibilidade
exitcodes=0